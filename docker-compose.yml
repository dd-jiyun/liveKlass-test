services:
  mysql:
    image: mysql:8.0
    container_name: liveklass-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: liveklass
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
